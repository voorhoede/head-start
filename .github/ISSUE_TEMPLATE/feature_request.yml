name: Feature request
description: Suggest an enhancement, new block, component, or capability for Head Start.
title: "[feature]: "
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Before submitting, please [search existing issues](https://github.com/voorhoede/head-start/issues?q=is%3Aissue) - this idea may already be on the roadmap.

        Reminder: small, focused proposals get picked up faster than broad rewrites. Read the [project philosophy](https://github.com/voorhoede/head-start#philosophy) before suggesting big architectural changes.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What pain point or use case does this address? Skip the solution here - just describe the gap.
      placeholder: |
        e.g. when editors add a long page, there's no way to give readers a table of contents. They paste anchor links by hand and they go stale.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you build, and how would it work? Sketches, API examples, screenshots all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why this one wins. "None" is a valid answer.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Where would this live in the codebase?
      options:
        - New block (`src/blocks/`)
        - New component (`src/components/`)
        - CMS schema / migration (`config/datocms/`)
        - Library / domain logic (`src/lib/`)
        - Tooling / scripts / CI
        - Documentation
        - Cross-cutting / not sure

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Closest topic label. Pick what fits, we'll relabel during triage.
      options:
        - "🚏 Routing & Rendering"
        - "🧱 Common components"
        - "🌐 Internationalisation (i18n)"
        - "🌈 Accessibility (a11y)"
        - "🧑‍💻 CMS Editor Experience"
        - "🧑‍💻 Developer Experience (DX)"
        - "🌱 Seed content"
        - "📚 Documentation"
        - "📊 Data Viz"
        - "📝 Forms"
        - "🗂️ Collections"
        - "🔒 Security"
        - "🫆 Analytics & Consent"
        - "🤖 AI Enhancements"
        - "⚡️ Performance"
        - "🧹 Tidy up"
        - Not sure / other

  - type: input
    id: reference
    attributes:
      label: Reference link (optional)
      description: Existing implementation, spec, design, or related issue/PR.
      placeholder: https://...

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Anything else - constraints, dependencies, edge cases.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates or related ideas.
          required: true
        - label: This idea fits Head Start's [philosophy](https://github.com/voorhoede/head-start#philosophy) (CMS-driven, locale-aware, small surface).
          required: true
