#import '~/lib/routing/HomeRoute.fragment.graphql'
#import '~/lib/routing/PageRoute.fragment.graphql'

fragment LlmsTxtMenuInternal on MenuItemInternalRecord {
  __typename
  internalTitle: title
  internalLink: link {
    __typename
    ... on HomePageRecord {
      ...HomeRoute
    }
    ... on PageRecord {
      ...PageRoute
      seo {
        description
      }
    }
  }
}

fragment LlmsTxtMenuExternal on MenuItemExternalRecord {
  __typename
  title
  link
}

fragment LlmsTxtMenuGroup on MenuItemGroupRecord {
  __typename
  title
}

query LlmsTxt($locale: SiteLocale!) {
  site: _site(locale: $locale) {
    globalSeo {
      siteName
      fallbackSeo {
        description
      }
    }
  }
  app(locale: $locale) {
    allowAiBots
    llmsIntro
    menuItems {
      __typename
      ... on MenuItemInternalRecord {
        ...LlmsTxtMenuInternal
        items {
          __typename
          ... on MenuItemInternalRecord { ...LlmsTxtMenuInternal }
          ... on MenuItemExternalRecord { ...LlmsTxtMenuExternal }
          ... on MenuItemGroupRecord {
            ...LlmsTxtMenuGroup
            items {
              __typename
              ... on MenuItemInternalRecord { ...LlmsTxtMenuInternal }
              ... on MenuItemExternalRecord { ...LlmsTxtMenuExternal }
              ... on MenuItemGroupRecord { ...LlmsTxtMenuGroup }
            }
          }
        }
      }
      ... on MenuItemExternalRecord {
        ...LlmsTxtMenuExternal
        items {
          __typename
          ... on MenuItemInternalRecord { ...LlmsTxtMenuInternal }
          ... on MenuItemExternalRecord { ...LlmsTxtMenuExternal }
          ... on MenuItemGroupRecord {
            ...LlmsTxtMenuGroup
            items {
              __typename
              ... on MenuItemInternalRecord { ...LlmsTxtMenuInternal }
              ... on MenuItemExternalRecord { ...LlmsTxtMenuExternal }
              ... on MenuItemGroupRecord { ...LlmsTxtMenuGroup }
            }
          }
        }
      }
      ... on MenuItemGroupRecord {
        ...LlmsTxtMenuGroup
        items {
          __typename
          ... on MenuItemInternalRecord { ...LlmsTxtMenuInternal }
          ... on MenuItemExternalRecord { ...LlmsTxtMenuExternal }
          ... on MenuItemGroupRecord {
            ...LlmsTxtMenuGroup
            items {
              __typename
              ... on MenuItemInternalRecord { ...LlmsTxtMenuInternal }
              ... on MenuItemExternalRecord { ...LlmsTxtMenuExternal }
              ... on MenuItemGroupRecord { ...LlmsTxtMenuGroup }
            }
          }
        }
      }
    }
  }
}
