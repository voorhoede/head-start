#import '@blocks/ActionBlock/ActionBlock.fragment.graphql'
#import '@blocks/ImageBlock/ImageBlock.fragment.graphql'
#import '@blocks/TableBlock/TableBlock.fragment.graphql'
#import '@blocks/VideoBlock/VideoBlock.fragment.graphql'
#import '@blocks/VideoEmbedBlock/VideoEmbedBlock.fragment.graphql'
#import '@blocks/CounterBlock/CounterBlock.fragment.graphql'
#import '@blocks/IconBlock/IconBlock.fragment.graphql'
#import '@blocks/ListBlock/ListBlockFragment.graphql'
#import '@content/Variables/CollectionEntry.fragment.graphql'
#import '@lib/routing/FileRoute.fragment.graphql'
#import '@lib/routing/HomeRoute.fragment.graphql'
#import '@lib/routing/PageRoute.fragment.graphql'

fragment TextBlock on TextBlockRecord {
  text {
    blocks {
      __typename
      ... on ActionBlockRecord {
        ...ActionBlock
      }
      ... on ImageBlockRecord {
        ...ImageBlock
      }
      ... on TableBlockRecord {
        ...TableBlock
      }
      ... on VideoBlockRecord {
        ...VideoBlock
      }
      ... on VideoEmbedBlockRecord {
        ...VideoEmbedBlock
      }
      ... on ListBlockRecord {
        ...ListBlock
      }
    }
    inlineBlocks {
      ... on CounterBlockRecord {
        ...CounterBlock
      }
      ... on IconBlockRecord {
        ...IconBlock
      }
    }
    links {
      __typename
      ... on FileRecord {
        ...FileRoute
      }
      ... on HomePageRecord {
        ...HomeRoute
      }
      ... on PageRecord {
        ...PageRoute
      }
      ... on VariableRecord {
        ...Variable
      }
    }
    value
  }
}
