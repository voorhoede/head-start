#import './AppMenu/AppMenu.fragment.graphql'

query DefaultLayout($locale: SiteLocale!) {
  seo: _site(locale: $locale) {
    faviconMetaTags(variants: [icon, appleTouchIcon, msApplication]) {
      tag
      attributes
    }
  }
  app(locale: $locale) {
    ...AppMenu
    allowAiBots
    openPageInLlmPrompt
    openPageInLlmOption {
      __typename
      id
      title
      url
      openInNewTab
      style
    }
  }
}
