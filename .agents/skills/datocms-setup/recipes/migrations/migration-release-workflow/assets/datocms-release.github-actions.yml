name: DatoCMS Release

on:
  workflow_dispatch:
    inputs:
      destination:
        description: Destination sandbox environment id
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run DatoCMS release helper
        run: node scripts/datocms-release.mjs "${{ inputs.destination }}"
        env:
          DATOCMS_API_TOKEN: ${{ secrets.DATOCMS_API_TOKEN }}
