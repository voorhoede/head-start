name: DatoCMS Blueprint Sync

on:
  workflow_dispatch:
    inputs:
      profiles:
        description: Space-separated destination profile ids
        required: true
      dry_run:
        description: Add --dry-run
        required: false
        default: "false"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run blueprint sync helper
        run: |
          EXTRA_ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="--dry-run"
          fi
          node scripts/datocms-sync-projects.mjs ${{ inputs.profiles }} $EXTRA_ARGS
        env:
          DATOCMS_BLUEPRINT_PROFILE_API_TOKEN: ${{ secrets.DATOCMS_BLUEPRINT_PROFILE_API_TOKEN }}
